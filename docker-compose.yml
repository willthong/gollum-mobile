services:
  gollum:
    image: ghcr.io/willthong/gollum-mobile:master
    container_name: gollum-wiki
    restart: unless-stopped
    ports:
      - "4567:4567"
    volumes:
      # Mount your git wiki repository
      - ./mywiki.git:/wiki
    environment:
      - RACK_ENV=production
      - APP_ENV=production
      # ACE editor auto-hides on viewports narrower than this (pixels)
      - GOLLUM_MOBILE_THRESHOLD=768
    command: >
      --math katex
      --allow-uploads dir
      --emoji
